name: build-docker

# Build image trên CI (không cần Docker ở máy local) rồi push lên GitHub Container Registry.
on:
  workflow_dispatch:            # cho phép bấm chạy thủ công trên tab Actions
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "app.py"
      - "moderate.py"
      - ".github/workflows/build-docker.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # cần để push lên ghcr.io
    steps:
      - name: Free disk space    # image lớn (~9GB) -> dọn bớt cho runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          docker-images: false

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: ghcr.io/spy-solution/moderation-service:latest
